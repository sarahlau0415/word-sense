  <style>
    :root {
      color-scheme: light;
      --paper: #fcfaf4;
      --white: #fffefa;
      --ink: #151515;
      --muted: #575750;
      --line: #d0cabb;
      --line-soft: #e4dfd3;
      --blue: #c5dcf4;
      --cobalt: #243fc8;
      --green: #5b8b40;
      --forest: #285542;
      --coral: #ff8875;
      --peach: #f5b08b;
      --gray: #d9d9d7;
      --board: #eee9dd;
      --note: #fff29e;
      --radius: 2px;
      --mono: "Courier New", "Liberation Mono", "Songti SC", monospace;
      --body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      --serif: Georgia, "Songti SC", "STSong", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--body);
    }

    body.notice-open {
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    code {
      font-family: var(--mono);
      font-size: 0.94em;
      background: rgba(19, 19, 19, 0.06);
      padding: 1px 4px;
    }

    .page {
      width: min(1360px, calc(100% - 34px));
      margin: 0 auto;
      padding: 18px 0 52px;
    }

    .release-layer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(20, 20, 18, 0.52);
      animation: release-fade-in 220ms ease-out both;
    }

    .release-layer[hidden] {
      display: none;
    }

    .release-layer.leaving {
      animation: release-fade-out 180ms ease-out both;
    }

    .release-note {
      position: relative;
      width: min(548px, 100%);
      padding: clamp(28px, 5vw, 42px);
      background:
        linear-gradient(rgba(255, 254, 250, 0.92), rgba(250, 246, 236, 0.95)),
        url("assets/archive/old-paper-texture.jpg") center / cover;
      box-shadow: 0 18px 62px rgba(12, 12, 11, 0.26);
      transform: rotate(-0.24deg);
    }

    .release-note::before {
      content: "";
      position: absolute;
      top: -9px;
      left: calc(50% - 29px);
      width: 58px;
      height: 17px;
      background: rgba(190, 169, 122, 0.62);
      transform: rotate(-2deg);
    }

    .release-dismiss {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px dotted #a69e90;
      background: transparent;
      color: #4f4b43;
      font: 700 16px/1 var(--mono);
    }

    .release-kicker {
      display: inline-block;
      margin: 0 0 27px;
      padding: 7px 9px;
      background: var(--ink);
      color: var(--white);
      font: 700 12px/1 var(--mono);
    }

    .release-note h2 {
      max-width: 380px;
      margin: 0 0 18px;
      font: 700 clamp(29px, 4vw, 37px)/1.22 var(--mono);
    }

    .release-note p {
      margin: 0 0 15px;
      max-width: 450px;
      color: #312f2a;
      font-size: 16px;
      line-height: 1.72;
    }

    .release-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 29px;
    }

    .release-enter {
      border: 0;
      padding: 14px 19px;
      background: var(--cobalt);
      color: #fffefa;
      font: 700 15px/1 var(--mono);
    }

    .release-once {
      color: #686258;
      font: 12px/1.5 var(--mono);
    }

    @keyframes release-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes release-fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .masthead {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      padding: 0 0 16px;
    }

    .brand {
      margin: 0;
      color: var(--ink);
      text-decoration: none;
      font: 700 clamp(25px, 3vw, 34px)/1 var(--mono);
    }

    .issue {
      display: flex;
      align-items: center;
      gap: 18px;
      font: 700 14px/1.2 var(--mono);
      color: var(--muted);
    }

    .issue span:last-child {
      border: 1px dashed #aea797;
      padding: 11px 14px;
      color: var(--ink);
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 17px;
    }

    .header-links a {
      color: var(--muted);
      font: 700 13px/1.2 var(--mono);
      text-decoration: none;
    }

    .header-links a:hover,
    .header-links a:focus-visible {
      color: var(--cobalt);
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(330px, 0.82fr) minmax(360px, 1fr);
      gap: clamp(30px, 6vw, 88px);
      align-items: end;
      padding: 54px 0 44px;
    }

    .intro h1 {
      margin: 0 0 17px;
      max-width: 490px;
      font: 700 clamp(38px, 5vw, 58px)/1.14 var(--mono);
    }

    .intro p {
      margin: 0;
      max-width: 474px;
      color: #33332e;
      font-size: 17px;
      line-height: 1.72;
    }

    .lookup {
      background: var(--white);
      padding: 20px;
      box-shadow: 0 1px 0 rgba(20, 20, 20, 0.06), 0 7px 22px rgba(20, 20, 20, 0.045);
    }

    .lookup-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font: 700 14px/1 var(--mono);
    }

    .lookup-title span {
      background: var(--ink);
      color: var(--white);
      padding: 7px 9px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 104px;
      gap: 8px;
    }

    .search-row input {
      min-height: 52px;
      width: 100%;
      border: 1px solid #c4bdae;
      background: #fff;
      outline: 0;
      padding: 0 13px;
      font: 700 21px/1 var(--mono);
    }

    .search-row input:focus,
    .context input:focus,
    .context textarea:focus {
      box-shadow: 4px 4px 0 var(--blue);
    }

    .search-row button {
      border: 0;
      background: var(--cobalt);
      color: #fff;
      font: 700 16px/1 var(--mono);
    }

    .search-row button:hover {
      background: #182c9f;
    }

    .context {
      display: grid;
      grid-template-columns: 0.75fr 1.15fr;
      gap: 8px;
      margin-top: 8px;
    }

    .context input,
    .context textarea {
      width: 100%;
      border: 1px dashed #c3bcaf;
      background: #fffefa;
      outline: 0;
      padding: 11px;
      color: var(--ink);
      font-size: 14px;
    }

    .context textarea {
      min-height: 67px;
      resize: vertical;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-top: 1px solid var(--line);
      padding-top: 17px;
      margin-bottom: 16px;
    }

    .gallery-header h2 {
      margin: 0;
      font: 700 19px/1 var(--mono);
    }

    .gallery-header p {
      margin: 0;
      color: var(--muted);
      font: 14px/1.4 var(--mono);
    }

    .gallery-tools {
      display: flex;
      align-items: center;
      gap: 17px;
    }

    .shelf-toggle {
      border: 1px dashed #aea797;
      background: transparent;
      min-height: 37px;
      padding: 0 12px;
      color: var(--forest);
      font: 700 13px/1 var(--mono);
    }

    .shelf-count {
      display: inline-flex;
      justify-content: center;
      min-width: 19px;
      margin-left: 6px;
      padding: 3px 5px;
      background: var(--forest);
      color: #f7f3e9;
    }

    .saved-drawer {
      margin: 0 0 17px;
      padding: 15px 17px;
      background: #edf0e3;
      border: 1px dashed #a9aa95;
    }

    .saved-drawer[hidden] {
      display: none;
    }

    .saved-drawer-head {
      margin: 0 0 11px;
      color: var(--forest);
      font: 700 12px/1.4 var(--mono);
    }

    .saved-drawer p {
      margin: 0;
      color: #514d45;
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .word-card {
      position: relative;
      overflow: hidden;
      height: clamp(212px, 17vw, 252px);
      border: 0;
      padding: 0;
      text-align: left;
      color: var(--ink);
      background: var(--card);
      box-shadow: 0 1px 0 rgba(22, 22, 22, 0.05), 0 5px 15px rgba(22, 22, 22, 0.045);
    }

    .card-face,
    .card-reveal {
      position: absolute;
      inset: 0;
      padding: 18px 17px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 240ms ease, opacity 210ms ease;
    }

    .card-face {
      background: var(--card);
    }

    .card-reveal {
      background: var(--reveal);
      transform: translateY(100%);
      color: var(--reveal-ink, var(--ink));
    }

    .word-card:hover .card-face,
    .word-card:focus-visible .card-face {
      transform: translateY(-22%);
      opacity: 0.25;
    }

    .word-card:hover .card-reveal,
    .word-card:focus-visible .card-reveal {
      transform: translateY(0);
    }

    .card-no {
      font: 700 12px/1 var(--mono);
      opacity: 0.66;
    }

    .card-word {
      display: block;
      margin-top: 15px;
      font: 700 clamp(26px, 2.55vw, 36px)/1.05 var(--mono);
      text-transform: lowercase;
      overflow-wrap: anywhere;
    }

    .card-word.compact {
      font-size: clamp(21px, 2.05vw, 29px);
      line-height: 1.12;
    }

    .translation {
      display: block;
      margin-top: 9px;
      font-size: 16px;
      font-weight: 500;
    }

    .card-foot {
      border-top: 1px solid rgba(21, 21, 21, 0.2);
      padding-top: 11px;
      font: 14px/1.35 var(--mono);
    }

    .card-reveal strong {
      display: block;
      margin-top: 14px;
      max-width: 250px;
      font: 700 clamp(17px, 1.6vw, 21px)/1.5 var(--serif);
    }

    .card-reveal .open {
      font: 700 14px/1 var(--mono);
    }

    .dossier {
      margin-top: 38px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 254, 250, 0.55), transparent 42%),
        linear-gradient(rgba(230, 223, 208, 0.8), rgba(230, 223, 208, 0.88)),
        url("assets/archive/old-paper-texture.jpg") center / cover;
      padding: clamp(18px, 4vw, 48px);
      display: none;
      box-shadow: inset 0 0 52px rgba(69, 52, 30, 0.1);
    }

    .dossier.open {
      display: block;
    }

    .file-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .file-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .file-label {
      background: #273129;
      color: #f7f3e9;
      padding: 9px 13px;
      font: 700 14px/1 var(--mono);
    }

    .close-file {
      border: 1px dashed #b4ae9e;
      background: var(--white);
      padding: 10px 13px;
      font: 700 13px/1 var(--mono);
      color: inherit;
      text-decoration: none;
    }

    .file-action {
      border: 1px solid #c9c0ae;
      background: rgba(255, 254, 250, 0.8);
      min-height: 37px;
      padding: 0 12px;
      color: #3d3933;
      font: 700 13px/1 var(--mono);
      transition: background 160ms cubic-bezier(0.16, 1, 0.3, 1), color 160ms cubic-bezier(0.16, 1, 0.3, 1), border-color 160ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .file-action:hover,
    .file-action:focus-visible {
      border-color: #285542;
      background: #f1ede2;
    }

    .file-action.selected {
      border-color: var(--cobalt);
      background: var(--blue);
      color: var(--cobalt);
    }

    .file-action.active {
      border-color: #285542;
      background: #285542;
      color: #f7f3e9;
    }

    .action-receipt[hidden] {
      display: none;
    }

    .action-receipt {
      position: relative;
      margin: -7px 0 26px auto;
      width: min(630px, 100%);
      padding: 18px 20px 19px;
      border: 1px dashed #b4ae9e;
      background:
        linear-gradient(rgba(255, 254, 250, 0.93), rgba(255, 254, 250, 0.93)),
        url("assets/archive/old-paper-texture.jpg") center / cover;
      box-shadow: 3px 4px 11px rgba(44, 35, 24, 0.08);
      animation: receipt-in 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes receipt-in {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .receipt-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 9px;
    }

    .receipt-kicker {
      color: #285542;
      font: 700 12px/1.4 var(--mono);
      text-transform: uppercase;
    }

    .receipt-close {
      border: 0;
      background: transparent;
      font: 700 13px/1 var(--mono);
    }

    .receipt-title {
      margin: 0 0 6px;
      color: var(--ink);
      font: 700 18px/1.45 var(--mono);
    }

    .receipt-copy,
    .receipt-next {
      margin: 0;
      color: #514d45;
      font: 14px/1.7 var(--body);
    }

    .receipt-next {
      margin-top: 12px;
      color: #285542;
      font-weight: 700;
    }

    .saved-shelf {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
    }

    .saved-shelf-label {
      color: #777064;
      font: 12px/1.4 var(--mono);
      margin-right: 3px;
    }

    .saved-file {
      background: #285542;
      color: #fffefa;
      padding: 6px 9px;
      text-decoration: none;
      font: 700 13px/1 var(--mono);
    }

    .share-choices {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 13px 0 11px;
    }

    .share-choice,
    .receipt-command {
      border: 1px solid #c9c0ae;
      background: var(--white);
      padding: 8px 11px;
      color: #403d36;
      font: 700 13px/1.2 var(--mono);
    }

    .share-choice.active {
      background: #c5dcf4;
      border-color: #243fc8;
      color: #243fc8;
    }

    .receipt-command {
      margin-top: 12px;
      border-color: #285542;
      background: #285542;
      color: #fffefa;
    }

    .receipt-text {
      display: block;
      width: 100%;
      min-height: 78px;
      resize: none;
      border: 1px dashed #b4ae9e;
      margin-top: 11px;
      padding: 10px;
      background: #f4f0e6;
      color: var(--ink);
      font: 13px/1.6 var(--mono);
    }

    .case-cover {
      position: relative;
      width: min(780px, 100%);
      margin: 14px auto 22px;
      padding: clamp(28px, 5vw, 48px);
      background:
        linear-gradient(rgba(249, 244, 231, 0.77), rgba(244, 237, 222, 0.84)),
        url("assets/archive/old-paper-texture.jpg") center / cover;
      box-shadow: 2px 4px 4px rgba(56, 39, 21, 0.08), 9px 14px 29px rgba(56, 39, 21, 0.12);
      transform: rotate(-0.35deg);
    }

    .case-cover::before {
      content: "";
      position: absolute;
      width: 62px;
      height: 19px;
      top: -10px;
      left: 48%;
      background: rgba(190, 169, 122, 0.52);
      transform: rotate(3deg);
    }

    .case-cover::after {
      content: "ARCHIVE COPY / HANDLE WITH CARE";
      position: absolute;
      right: 28px;
      bottom: 20px;
      color: rgba(110, 63, 47, 0.7);
      font: 700 11px/1 var(--mono);
      border: 1px solid rgba(110, 63, 47, 0.46);
      padding: 7px 8px;
      transform: rotate(-2deg);
    }

    .word-heading {
      margin: 0 0 9px;
      font: 700 clamp(42px, 5vw, 64px)/1 var(--mono);
    }

    .surface-label {
      margin: 0;
      display: inline-block;
      border: 1px solid #d0c9b9;
      padding: 6px 10px;
      color: #3c3c37;
      font-size: 15px;
    }

    .clue-trail {
      width: min(780px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0;
      background: #f7f2e7;
      box-shadow: 2px 5px 15px rgba(46, 35, 23, 0.07);
    }

    .artifact {
      position: relative;
      width: 100%;
      margin-left: 0;
      padding: clamp(30px, 4vw, 40px) clamp(25px, 5vw, 44px);
      font: 18px/1.82 var(--serif);
      box-shadow: none;
      transform: none;
      border-top: 1px solid rgba(76, 63, 45, 0.12);
    }

    .artifact-tag {
      position: static;
      display: inline-flex;
      align-items: center;
      margin-bottom: 19px;
      padding: 0;
      background: transparent;
      color: #645d50;
      font: 700 13px/1 var(--mono);
      box-shadow: none;
      transform: none;
    }

    .artifact-tag::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 9px;
      border-radius: 50%;
      background: var(--tag-color, var(--cobalt));
    }

    .artifact p,
    .artifact-copy p {
      margin: 0;
    }

    .artifact-copy p + p {
      margin-top: 14px;
    }

    .artifact-literal {
      background:
        linear-gradient(rgba(240, 236, 226, 0.76), rgba(236, 231, 218, 0.79)),
        url("assets/archive/old-paper-texture.jpg") center / cover;
      font: 15px/1.72 var(--mono);
      border-top: 0;
    }

    .clipping-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 3px double rgba(30, 28, 24, 0.5);
      color: #514b40;
      font: 700 11px/1.25 var(--mono);
      text-transform: uppercase;
    }

    .artifact-literal .slip-definition {
      margin: 0 0 20px;
      color: #3e3c37;
      font: 14px/1.7 var(--mono);
      column-count: 2;
      column-gap: 25px;
      column-rule: 1px solid rgba(34, 32, 27, 0.18);
    }

    .artifact-literal .slip-definition b {
      display: block;
      color: var(--ink);
      font-size: 25px;
      text-transform: lowercase;
    }

    .artifact-feeling {
      background:
        linear-gradient(90deg, transparent 47px, rgba(183, 70, 62, 0.16) 47px 48px, transparent 48px),
        repeating-linear-gradient(180deg, transparent 0 34px, rgba(77, 100, 123, 0.09) 34px 35px),
        #f6f1df;
      padding-left: clamp(59px, 8vw, 70px);
      font-size: 19px;
      line-height: 1.7;
    }

    .margin-note {
      display: block;
      margin: 0 0 18px;
      color: #7c7061;
      font: 12px/1.4 var(--mono);
      text-transform: uppercase;
    }

    .neighbor-notes {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 21px;
    }

    .neighbor-note {
      flex: 1 1 184px;
      padding: 9px 11px;
      background: rgba(255, 252, 237, 0.38);
      color: #494338;
      font: 14px/1.58 var(--mono);
    }

    .neighbor-note b {
      display: block;
      margin-bottom: 5px;
      color: #b55749;
      font-size: 15px;
    }

    .artifact-origin {
      isolation: isolate;
      overflow: hidden;
      background:

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function entryPreview(markdown, fallback = "") {
      const text = String(markdown || "")
        .replace(/\*\*[^*]+\*\*\s*·\s*/g, "")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\*([^*\n]+)\*/g, "$1")
        .replace(/^>\s*/gm, "")
        .replace(/\s+/g, " ")
        .trim();
      if (!text) return fallback;
      const firstSentence = text.match(/^[^。！？.!?]{18,80}[。！？.!?]/);
      return firstSentence ? firstSentence[0] : text.slice(0, 56);
    }

    function inline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
    }

      try {

        // Private browsing may block local storage; the notice can safely reappear.
      }
      releaseNotice.classList.add("leaving");

    function paragraphs(text) {

    function cleanUsageLine(line) {
      return String(line || "")
        .trim()
        .replace(/^>\s?/, "")
        .replace(/\s{2,}$/g, "")
        .trim();
    }

    function isUsageLabel(paragraph) {
      const text = String(paragraph || "").trim();
      if (!text || text.startsWith(">")) return false;
      if (/^[-`]/.test(text)) return false;
      if (/。|，|；|：/.test(text) && text.length > 18) return false;
      return text.length <= 32;
    }

    function renderUsageBlock(label, quoteParagraph, noteParagraph = "") {
      const quoteLines = String(quoteParagraph)
        .split("\n")
        .map(cleanUsageLine)
        .filter(Boolean);
      let scene = String(label || "").trim().replace(/^#+\s*/, "").replace(/[:：]\s*$/, "");
      if (quoteLines[0]) {
        const quotedLabel = quoteLines[0].match(/^\*\*\[?(.+?)\]?\*\*$/);
        if (quotedLabel) {
          scene = quotedLabel[1].trim();
          quoteLines.shift();
        }
      }
      const english = quoteLines.find(line => /[A-Za-z]/.test(line) && !/[\u4e00-\u9fff]/.test(line)) || "";
      const directZh = quoteLines.find(line => /[\u4e00-\u9fff]/.test(line)) || usageTranslations[english] || "";
      const note = noteParagraph ? inline(noteParagraph).replace(/\n/g, "<br>") : "";
      return `
        <div class="usage-excerpt">
          ${scene ? `<strong>${escapeHtml(scene)}</strong>` : ""}
          ${english ? `<span class="en-line">${inline(english)}</span>` : ""}
          ${directZh ? `<span class="zh-line">${inline(directZh)}</span>` : ""}
          ${note ? `<span class="usage-note">${note}</span>` : ""}
        </div>
      `;
    }

    function usageParagraphs(text) {
      const blocks = String(text).split(/\n{2,}/).map(block => block.trim()).filter(Boolean);
      const rendered = [];
      for (let index = 0; index < blocks.length; index += 1) {
        const block = blocks[index];
        const lines = block.split("\n").map(line => line.trim()).filter(Boolean);
        const boldLabel = lines[0]?.match(/^\*\*\[?(.+?)\]?\*\*$/);
        const hasQuote = lines.some(line => line.startsWith(">"));

        if (boldLabel && hasQuote) {
          const note = blocks[index + 1] && !blocks[index + 1].startsWith(">") && !isUsageLabel(blocks[index + 1])
            ? blocks[++index]
            : "";
          rendered.push(renderUsageBlock(boldLabel[1], block, note));
          continue;
        }

        if (isUsageLabel(block) && blocks[index + 1]?.startsWith(">")) {
          const quoteBlock = blocks[++index];
          const note = blocks[index + 1] && !blocks[index + 1].startsWith(">") && !isUsageLabel(blocks[index + 1])
            ? blocks[++index]
            : "";
          rendered.push(renderUsageBlock(block, quoteBlock, note));
          continue;
        }

        if (block.startsWith(">")) {
          rendered.push(renderUsageBlock("", block));
          continue;
        }

        rendered.push(`<p>${inline(block).replace(/\n/g, "<br>")}</p>`);
      }
      return rendered.join("");
    }

    function tag(label, color) {
      return `<span class="artifact-tag" style="--tag-color:${color}">${escapeHtml(label)}</span>`;
    }

    function renderTrail(entries, data = {}, source = "", sentence = "", word = currentFile) {
      const content = Object.fromEntries(entries);
      const examples = (data.examples || []).map(([label, text]) => `
        <div class="quote-clip">
          <b>${escapeHtml(label)}</b>
          ${escapeHtml(text)}
        </div>
      `).join("");
      const evidenceSentence = sentence || data.sampleSentence || "";
      const evidenceSource = source || data.sampleSource || "";
      const evidence = evidenceSentence || evidenceSource
        ? `<p class="source-line">${evidenceSentence ? `原句 / ${escapeHtml(evidenceSentence)}` : ""}${evidenceSentence && evidenceSource ? "<br>" : ""}${evidenceSource ? `出处 / ${escapeHtml(evidenceSource)}` : ""}</p>`
        : `<p class="source-line empty"></p>`;
      const literalSlip = data.slip
        ? `<div class="slip-definition">${data.slip}</div>`
        : "";
      const neighbors = (data.neighbors || []).map(([word, note]) => `
        <div class="neighbor-note">
          <b>${escapeHtml(word)}</b>${escapeHtml(note)}
        </div>
      `).join("");
      const sources = (data.verification?.sources || []).map(([label, url]) => `
        <a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>
      `).join("");
      const traceLabel = sources ? "sources noted below" : "reading note / source not filed";
      const traceContents = data.originCitation || (sources
        ? "documented forms<br>meaning shifts<br>sources below"
        : "formation<br>history in use<br>read as a note");
      const contrast = data.contrast || [
        ["English in use", evidenceSentence || "a lived scene before a translated label"],
        ["中文落点", "这里记录直译容易漏掉的部分"]
      ];
      const contextualReading = `
        <div class="context-reading">
          ${evidence}
          <div class="artifact-copy">${paragraphs(content["此处"] || "没有原句时，这里记录最常见的理解落点。")}</div>
        </div>`;

      return `
        <section class="artifact artifact-literal">
          ${tag("01 / 字面", "#243fc8")}
          <div class="clipping-header"><span>Language desk / entry</span><span>Surface reading</span></div>
          ${literalSlip}
          <div class="artifact-copy">${paragraphs(content["字面"] || "正在整理这个词最具体的画面。")}</div>
        </section>
        <section class="artifact artifact-feeling">
          ${tag("02 / 感觉", "#e86953")}
          <span class="margin-note">pencil notes / compare before translating</span>
          <div class="artifact-copy">${paragraphs(content["感觉"] || "正在辨认这个词的质地与温度。")}</div>
          ${neighbors ? `<div class="neighbor-notes">${neighbors}</div>` : ""}
        </section>
        <section class="artifact artifact-origin">
          ${tag("03 / 溯源", "#5b8b40")}
          <div class="origin-volume-head">
            <strong>Word History Notes</strong>
            <span>tracing forms and shifts</span>
          </div>
          <div class="folio">
            <aside class="origin-citation">
              <span class="citation-label">${traceLabel}</span>
              <b class="${citationHeadwordClass(word || "entry")}">${escapeHtml(word || "entry")}</b>
              <span class="margin-note">source trail</span>
              <strong>${traceContents}</strong>
            </aside>
            <article class="origin-entry">
              <div class="origin-entry-head">
                <strong>${escapeHtml(word || "entry")}</strong>
                <span>history &amp; descent</span>
              </div>
              <span class="book-mark">Notes on where the word travelled from</span>
              <div class="artifact-copy">${paragraphs(content["来历"] || "正在查找这个用法从哪里长出来。")}</div>
              ${sources ? `<div class="source-ledger"><span>sources /</span>${sources}</div>` : ""}
            </article>
          </div>
        </section>
        <section class="artifact artifact-uses">
          ${tag("04 / 各路用法", "#32618a")}
          <div class="news-head"><strong>The Usage Dispatch</strong><span>voices from different scenes</span></div>
          <div class="artifact-copy news-copy">${usageParagraphs(content["用法"] || "正在搜集它出现过的真实场面。")}</div>
          ${examples ? `<div class="quote-clips">${examples}</div>` : ""}
        </section>
        <section class="artifact artifact-context">
          ${tag("05 / 英汉之间", "#c48620")}
          <div class="film-strip">
            <div class="film-frames">
              <div class="contrast-frame en">
                <span class="contrast-label">${escapeHtml(contrast[0][0])}</span>
                <p>${inline(contrast[0][1]).replace(/\n/g, "<br>")}</p>
              </div>
              <div class="contrast-frame zh">
                <span class="contrast-label">${escapeHtml(contrast[1][0])}</span>
                <p>${inline(contrast[1][1]).replace(/\n/g, "<br>")}</p>
              </div>
            </div>
          </div>
          ${contextualReading}
        </section>
        <section class="artifact artifact-insight">
          ${tag("06 / 悟道时刻", "#285542")}
          <div class="insight-transcript">
            <div class="artifact-copy">${paragraphs(content["悟道时刻"] || "正在等待一条可以迁移到下一个词的线索。")}</div>
            <div class="save-insight">
              <span>Word Sense / keeper card</span>
              <button type="button" data-save-insight>收藏这一张</button>
              <p class="keeper-feedback" data-keeper-feedback aria-live="polite" hidden></p>
            </div>
          </div>
        </section>
      `;
    }

    function parseGeneratedDimensions(answer) {
      const alias = {
        "字面含义": "字面",
        "本体质感": "感觉",
        "寻根溯源": "来历",
        "各路用法": "用法",
        "原生思维": "此处",
        "英汉分野": "此处",
        "悟道时刻": "悟道时刻"
      };
      const labels = "字面含义|本体质感|寻根溯源|各路用法|原生思维|英汉分野|悟道时刻|字面|感觉|来历|用法|此处";
      const cleanAnswer = String(answer)
        .replace(/^\s*#\s*改写终稿\s*/i, "")
        .split(/\n---\s*\n#\s*改动说明/i)[0]
        .trim();
      const blocks = cleanAnswer.split(new RegExp(`(?=\\*\\*(?:${labels})\\*\\*\\s*·)`));
      const parsed = blocks.map(block => {
        const match = block.match(new RegExp(`^\\s*\\*\\*(${labels})\\*\\*\\s*·\\s*([\\s\\S]*)$`));
        return match ? [alias[match[1]] || match[1], match[2].trim()] : null;
      }).filter(Boolean);
      return parsed.length >= 4 ? parsed : [["感觉", cleanAnswer]];
    }

    function showFile(word, data, source = "", sentence = "") {
      currentFile = word;
      currentData = data;
      currentSource = source;
      currentSentence = sentence;
      document.title = `${word} | Word Sense`;
      fileLabel.textContent = `file / ${word}`;
      detailWord.textContent = word;
      detailSurface.textContent = `正面写着：${data.surface}`;
      const entries = data.markdown ? parseGeneratedDimensions(data.markdown) : data.story;
      clueTrail.innerHTML = renderTrail(entries, data, source, sentence, word);
      updateFileLink(word);
      refreshSavedState();
      closeActionReceipt();

      dossier.classList.add("open");
    }

    function updateFileLink(word) {
      const url = new URL(window.location.href);
      url.searchParams.delete("notice");
      url.searchParams.set("word", word);
      url.hash = "";
      window.history.replaceState({}, "", url);
    }

    function filePermalink(word) {
      const url = new URL(window.location.href);
      url.search = "";
      url.searchParams.set("word", word);
      return url.toString();
    }

    function readSavedFiles() {
      try {
        const saved = JSON.parse(window.localStorage.getItem(savedFilesKey) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch (error) {
        return [];
      }
    }

    function renderSavedDrawer() {
      const saved = readSavedFiles();
      savedCount.textContent = String(saved.length);
      if (!saved.length) {
        savedDrawer.innerHTML = `
          <p class="saved-drawer-head">saved files / 0</p>
          <p>这里还没有词卡。读到想留下的词，点击“收藏”。</p>
        `;
        return;
      }
      savedDrawer.innerHTML = `
        <p class="saved-drawer-head">saved files / ${saved.length}</p>
        <div class="saved-shelf" aria-label="已收藏的词卡">
          ${saved.map(word => `
            <a class="saved-file" href="${escapeHtml(filePermalink(word))}">${escapeHtml(word)}</a>
          `).join("")}
        </div>
      `;
    }

    function refreshSavedState() {
      if (!currentFile) return;
      const saved = readSavedFiles().includes(currentFile);
      saveFile.classList.toggle("active", saved);
      saveFile.textContent = saved ? "已收藏" : "收藏";
      saveFile.setAttribute("aria-pressed", String(saved));
      const keeperButton = clueTrail.querySelector("[data-save-insight]");
      if (keeperButton) {
        keeperButton.classList.toggle("active", saved);
        keeperButton.textContent = saved ? "已收藏" : "收藏这一张";
      }
    }

    function showActionReceipt(content, source) {
      actionReceipt.dataset.source = source;
      saveFile.classList.toggle("selected", source === "save");
      copyFile.classList.toggle("selected", source === "copy");
      shareFile.classList.toggle("selected", source === "share");
      saveFile.setAttribute("aria-expanded", String(source === "save"));
      copyFile.setAttribute("aria-expanded", String(source === "copy"));
      shareFile.setAttribute("aria-expanded", String(source === "share"));
      receiptContent.innerHTML = `
        <div class="receipt-head">
          <span class="receipt-kicker">${escapeHtml(source)} / handling slip</span>
          <button class="receipt-close" type="button" data-close-receipt aria-label="关闭处理回执">X</button>
        </div>
        ${content}
      `;
      actionReceipt.hidden = false;
    }

    function closeActionReceipt() {
      actionReceipt.hidden = true;
      receiptContent.innerHTML = "";
      delete actionReceipt.dataset.source;
      saveFile.classList.remove("selected");
      copyFile.classList.remove("selected");
      shareFile.classList.remove("selected");
      saveFile.setAttribute("aria-expanded", "false");
      copyFile.setAttribute("aria-expanded", "false");
      shareFile.setAttribute("aria-expanded", "false");
    }

    function savedShelf(saved) {
      if (!saved.length) return "";
      return `
        <div class="saved-shelf" aria-label="你的收藏">
          <span class="saved-shelf-label">你的收藏 /</span>
          ${saved.slice(0, 8).map(word => `
            <a class="saved-file" href="${escapeHtml(filePermalink(word))}">${escapeHtml(word)}</a>
          `).join("")}
        </div>
      `;
    }

    function showSavedReceipt(removed) {
      const saved = readSavedFiles();
      const title = removed ? `${currentFile} 已移出收藏` : `${currentFile} 已收入收藏`;
      const copy = removed
        ? "这张词卡不再保留收藏标记；阅读内容仍然可以继续打开。"
        : "收藏标记保存在这台浏览器中。下次打开这张词卡，它仍会显示在你的收藏里。";
      showActionReceipt(`
        <h3 class="receipt-title">${escapeHtml(title)}</h3>
        <p class="receipt-copy">${escapeHtml(copy)}</p>
        ${savedShelf(saved)}
        ${removed ? "" : '<button class="receipt-command" type="button" data-open-shelf>打开收藏夹</button>'}
        <p class="receipt-next">${removed ? "下一步：继续阅读，或重新收藏这一张。" : "下一步：你可以继续阅读，收藏已经放好了。"}</p>
      `, "save");
    }

    function showKeeperFeedback(message) {
      const keeperFeedback = clueTrail.querySelector("[data-keeper-feedback]");
      if (!keeperFeedback) return;
      keeperFeedback.textContent = message;
      keeperFeedback.hidden = false;
    }

    function toggleSavedFile(origin = "toolbar") {
      if (!currentFile) return;
      const saved = readSavedFiles();
      const existing = saved.indexOf(currentFile);
      if (existing >= 0) {
        saved.splice(existing, 1);
      } else {
        saved.unshift(currentFile);
      }
      try {
        window.localStorage.setItem(savedFilesKey, JSON.stringify(saved));
        if (origin === "keeper") {
          showKeeperFeedback(existing >= 0
            ? "已移出收藏。需要时仍可在这里重新收下它。"
            : "已收藏。下次在这台浏览器打开它，收藏标记还会在。");
        } else {
          showSavedReceipt(existing >= 0);
        }
      } catch (error) {
        if (origin === "keeper") {
          showKeeperFeedback("这次没有保存下来。你仍可以复制链接留住这张词卡。");
        } else {
          showActionReceipt(`
            <h3 class="receipt-title">这次没有保存下来</h3>
            <p class="receipt-copy">浏览器没有允许保存收藏标记，你仍然可以复制链接留住这张词卡。</p>
          `, "save");
        }
      }
      renderSavedDrawer();
      refreshSavedState();
    }

    function activeFileText() {
      const entries = currentData?.markdown
        ? parseGeneratedDimensions(currentData.markdown)
        : (currentData?.story || []);
      const context = [
        currentSentence && `原句 / ${currentSentence}`,
        currentSource && `出处 / ${currentSource}`
      ].filter(Boolean).join("\n");
      return [
        `${currentFile} | Word Sense`,
        context,
        entries.map(([label, text]) => `${label}\n${text}`).join("\n\n"),
        filePermalink(currentFile)
      ].filter(Boolean).join("\n\n");
    }

    function legacyCopy(text) {
      const field = document.createElement("textarea");
      field.value = text;
      field.setAttribute("readonly", "");
      field.style.position = "fixed";
      field.style.left = "-9999px";
      document.body.appendChild(field);
      field.select();
      const copied = document.execCommand("copy");
      field.remove();
      return copied;
    }

    async function tryCopy(text) {
      if (legacyCopy(text)) return true;
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (error) {
        return false;
      }
    }

    async function copyCurrentFile() {
      if (!currentFile) return;
      const text = activeFileText();
      const copied = await tryCopy(text);
      showActionReceipt(`
        <h3 class="receipt-title">${copied ? "完整词条已复制" : "词条内容已为你备好"}</h3>
        <p class="receipt-copy">${copied
          ? "它包含六段阅读内容和回看链接。"
          : "浏览器没有允许自动复制，请选中下方内容后复制。"}</p>
        ${copied ? "" : `<textarea class="receipt-text" readonly aria-label="可复制的完整词条">${escapeHtml(text)}</textarea>`}
        <p class="receipt-next">下一步：粘贴到备忘录、Notion 或自己的语言笔记里。</p>
      `, "copy");
    }

    function buildShareText(style = "direct") {
      const link = filePermalink(currentFile);
      const templates = {
        direct: `我刚在 Word Sense 读了「${currentFile}」。它不只是一个中文释义，而是一张关于真实用法的词条档案。\n${link}`,
        social: `今天重新认识了一个词：${currentFile}。\n原来它在英文里的质感，远比中文正面那一行丰富。\n${link}`,
        work: `分享一张 Word Sense 词条档案：${currentFile}。\n它从字面、质感、来路和语境里重新校准这个词的读法。\n${link}`
      };
      return templates[style] || templates.direct;
    }

    function showShareComposer(style = currentShareStyle, state = "") {
      currentShareStyle = style;
      const text = buildShareText(style);
      const status = state === "copied"
        ? '<p class="receipt-next">已复制。下一步：打开微信、朋友圈或群聊，直接粘贴。</p>'
        : '<p class="receipt-next">下一步：选一种口吻，复制后粘到你想分享的地方。</p>';
      showActionReceipt(`
        <h3 class="receipt-title">把 ${escapeHtml(currentFile)} 发给谁？</h3>
        <p class="receipt-copy">先选一段合适的引子，分享出去的会是这张词卡的链接。</p>
        <div class="share-choices" aria-label="分享口吻">
          <button class="share-choice${style === "direct" ? " active" : ""}" type="button" data-share-style="direct">发给朋友</button>
          <button class="share-choice${style === "social" ? " active" : ""}" type="button" data-share-style="social">发动态</button>
          <button class="share-choice${style === "work" ? " active" : ""}" type="button" data-share-style="work">发工作群</button>
        </div>
        <textarea class="receipt-text" readonly aria-label="分享文案">${escapeHtml(text)}</textarea>
        <button class="receipt-command" type="button" data-copy-share>复制这段分享文案</button>
        ${status}
      `, "share");
    }

    async function shareCurrentFile() {
      if (!currentFile) return;
      showShareComposer("direct");
    }

    function showCatalogFile(word) {
      if (files[word]) {
        showFile(word, files[word]);
        return;
      }

      const card = cardCatalog.find(item => item.word === word);
      const entry = window.WORD_SENSE_ENTRIES && window.WORD_SENSE_ENTRIES[word];
      if (!entry) {
        showError(word, "这份词条暂时还没有加入阅读档案。");
        return;
      }
      const fallbackPreview = entryPreview(entry.markdown, "从这份词条里抽出一个用法线索");
      const surfaceText = entry.surface || card?.meaning || fallbackPreview;
      const surfaceMeaning = `“${surfaceText}”`;
      const issueLabel = (entry.meta || []).find(item => /^Issue \d+$/i.test(item)) || "Word Sense";
      const slipLabel = issueLabel === "Issue 006" ? "current issue / issue 006" : `archive entry / ${issueLabel.toLowerCase()}`;

      showFile(word, {
        surface: surfaceMeaning,
        slip: `<b>${escapeHtml(word)}</b><br>${escapeHtml(slipLabel)}<br><br>${escapeHtml(surfaceText)}`,
        markdown: entry.markdown,
        contrast: [
          ["English in use", `${word} in actual sentences`],
          ["中文正面写着", surfaceMeaning]
        ],
        verification: {
          sources: (entry.verification?.sources || []).slice(0, 5).map(item => [item.label, item.url])
        }
      });
    }

    function showLoading(word, source, sentence) {
      fileLabel.textContent = `search / ${word}`;
      detailWord.textContent = word;
      detailSurface.textContent = "正在抽出这张词卡";
      clueTrail.innerHTML = `
        <section class="artifact artifact-literal">
          ${tag("IN PROGRESS", "#243fc8")}
          <p class="loading-sheet">正在整理用法、语气与例句</p>
        </section>
      `;
      dossier.classList.add("open");
      dossier.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function showGenerated(word, answer, source, sentence) {
      const generatedDimensions = parseGeneratedDimensions(answer);
      fileLabel.textContent = `new file / ${word}`;
      detailWord.textContent = word;
      detailSurface.textContent = "从真实使用里整理出的档案";
      clueTrail.innerHTML = renderTrail(generatedDimensions, {}, source, sentence, word);
    }

    function showError(word, message) {
      detailSurface.textContent = "这份档案暂时没有整理成功";
      clueTrail.innerHTML = `
        <section class="artifact artifact-literal">
          ${tag("FILE UNAVAILABLE", "#b4382b")}
          <p class="error-note">${escapeHtml(message)}</p>
          <p>精选词卡仍然可以阅读；新词生成暂时没有连接到这个预览页面。</p>
        </section>
      `;
    }

    renderSavedDrawer();

    saveFile.addEventListener("click", toggleSavedFile);
    copyFile.addEventListener("click", copyCurrentFile);
    shareFile.addEventListener("click", shareCurrentFile);
    actionReceipt.addEventListener("click", async event => {
      if (event.target.closest("[data-close-receipt]")) {
        closeActionReceipt();
        return;
      }

      if (event.target.closest("[data-open-shelf]")) {
        savedDrawer.hidden = false;
        savedShelfToggle.setAttribute("aria-expanded", "true");
        savedDrawer.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      const styleButton = event.target.closest("[data-share-style]");
      if (styleButton) {
        showShareComposer(styleButton.dataset.shareStyle || "direct");
        return;
      }

      if (event.target.closest("[data-copy-share]")) {
        const text = buildShareText(currentShareStyle);
        const copied = await tryCopy(text);
        if (copied) {
          showShareComposer(currentShareStyle, "copied");
        } else {
          showShareComposer(currentShareStyle);
          const nextStep = receiptContent.querySelector(".receipt-next");
          if (nextStep) {
            nextStep.textContent = "浏览器没有允许自动复制。请选中上面的分享文案，手动复制后粘贴。";
          }
          const field = receiptContent.querySelector(".receipt-text");
          field?.focus();
          field?.select();
        }
      }
    });
    savedShelfToggle.addEventListener("click", () => {
      const willOpen = savedDrawer.hidden;
      renderSavedDrawer();
      savedDrawer.hidden = !willOpen;
      savedShelfToggle.setAttribute("aria-expanded", String(willOpen));
    });
    clueTrail.addEventListener("click", event => {
      if (event.target.closest("[data-save-insight]")) {
        toggleSavedFile("keeper");
      }
    });

    const initialWord = new URLSearchParams(window.location.search).get("word")?.trim().toLowerCase();
    if (initialWord && (files[initialWord] || window.WORD_SENSE_ENTRIES?.[initialWord])) {
      showCatalogFile(initialWord);
    } else if (initialWord) {
      currentFile = initialWord;
      detailWord.textContent = initialWord;
      showError(initialWord, "这份词条还没有进入阅读档案。回到索引页搜索它，我们会为它整理一份新档案。");
    } else {
      currentFile = "未选择词条";
      detailWord.textContent = "打开一张词卡";
      detailSurface.textContent = "先从索引页选择一个词";
      showError("", "请回到词卡索引，抽出一张你想读的词。");
    }
  </script>
  <script src="/word-sense-events.js"></script>
  <script>
    if ("serviceWorker" in navigator && window.location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("/service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
