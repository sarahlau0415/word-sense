<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1b1712" flood-opacity="0.16"/></filter>
    <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="13"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0.035 0.14"/></feComponentTransfer><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.8" fill="#15120f" opacity="0.22"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#f4efe4"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#1b1712" stroke-width="2" stroke-dasharray="2 8" opacity="0.32"/>
  <g transform="translate(62 54) rotate(-1)"><rect width="318" height="48" fill="#15120f"/><text x="22" y="33" fill="#fff7e8" font-family="Courier New, monospace" font-size="22" font-weight="700">WORD SENSE / ISSUE 002</text></g>
  <text x="62" y="170" fill="#15120f" font-family="Georgia, Songti SC, Noto Serif CJK SC, serif" font-size="54" font-weight="800"><tspan x="62" dy="0">18 个你以为懂了的词，</tspan><tspan x="62" dy="68">被一张张抽出来看背面</tspan></text>
  <g filter="url(#shadow)" transform="translate(70 315) rotate(-3)"><rect width="235" height="195" rx="2" fill="#b8d7ef" filter="url(#paper)"/><rect width="235" height="195" fill="url(#dots)" opacity="0.06"/><text x="26" y="60" fill="#15120f" font-family="Courier New, monospace" font-size="40" font-weight="700">surge</text><text x="26" y="112" fill="#15120f" font-family="Georgia, Songti SC, serif" font-size="25" font-weight="800"><tspan x="26" dy="0">不是增加，</tspan><tspan x="26" dy="35">是力量往上涌</tspan></text></g>
  <g filter="url(#shadow)" transform="translate(335 292) rotate(2)"><rect width="245" height="220" rx="2" fill="#5b8f3f" filter="url(#paper)"/><rect width="245" height="220" fill="url(#dots)" opacity="0.06"/><text x="26" y="64" fill="#fff7e8" font-family="Courier New, monospace" font-size="40" font-weight="700">verify</text><text x="26" y="120" fill="#fff7e8" font-family="Georgia, Songti SC, serif" font-size="26" font-weight="800"><tspan x="26" dy="0">相信之前，</tspan><tspan x="26" dy="36">先碰证据</tspan></text></g>
  <g filter="url(#shadow)" transform="translate(610 325) rotate(-1)"><rect width="235" height="195" rx="2" fill="#fb846f" filter="url(#paper)"/><rect width="235" height="195" fill="url(#dots)" opacity="0.06"/><text x="26" y="60" fill="#15120f" font-family="Courier New, monospace" font-size="40" font-weight="700">cringe</text><text x="26" y="112" fill="#15120f" font-family="Georgia, Songti SC, serif" font-size="25" font-weight="800"><tspan x="26" dy="0">不是尴尬，</tspan><tspan x="26" dy="35">是身体先退</tspan></text></g>
  <g filter="url(#shadow)" transform="translate(875 292) rotate(2)"><rect width="250" height="230" rx="2" fill="#316f8f" filter="url(#paper)"/><rect width="250" height="230" fill="url(#dots)" opacity="0.06"/><text x="24" y="62" fill="#fff7e8" font-family="Courier New, monospace" font-size="32" font-weight="700">grounding</text><text x="24" y="120" fill="#fff7e8" font-family="Georgia, Songti SC, serif" font-size="25" font-weight="800"><tspan x="24" dy="0">把漂浮回答</tspan><tspan x="24" dy="35">接回地面</tspan></text></g>
  <text x="62" y="570" fill="#5b5148" font-family="Georgia, Songti SC, Noto Serif CJK SC, serif" font-size="28" font-weight="700">一个词，一份小档案。读完一张，再抽出下一张。</text>
</svg>