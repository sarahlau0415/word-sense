  </text>
  <line x1="130" y1="194" x2="1070" y2="194" stroke="#E5DECF" stroke-width="2"/>
  <text x="130" y="285" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#1F1B16">
